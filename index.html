<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website_MacBook</title>
    <style>
        body {
            margin : 0px;
        }
        .navbar {
            background-color : black;
            display : flex;
            justify-content : space-between;
            align-items : center;
            padding : 10px;
        }
        .navbar a {
            color : white;
            text-decoration : none;
            font-size : 16px; 
        }
        .menu a {
            font-size : 14px;
            text-decoration : none;
            color : white;
            margin : 10px;
        }
        .menu a:hover {
            color : #32c3e7;
        }
        .Home {
            background : url("ภาพพื้นหลังร้านMacbook.jpg");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            object-fit : cover;
            height : 685px;
            width: 100%;
            display : flex;
            justify-content : center;
            align-items: center;
        }
        .text h1 {
            margin-top : 0;
            font-size: 22px;

        }
        .text {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.515);
            color : white;
            padding : 15px;
            border-radius: 40px;
            transition: 0.9s;
            box-shadow: 20px 20px 50px blue;
        }
        .text:hover {
            transform: scale(1.05);
        }
        .text button {
            background-color : rgb(92, 156, 235);
            color : white;
            border : none;
            border-radius : 20px;
            padding : 7px;
            box-shadow: 2px 2px 50px blue;
            cursor :pointer;
        }
    </style>
</head>
<body>
<!--------------- เเถบเมนู --------------->
    <div class="navbar">
        <a href="#">MacBook Store 🍎 </a>
        <div class="menu">
            <a href="#home">Home</a>
            <a href="#macbook">MacBook</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </div>
<!--------------- หน้าหลัก --------------->
    <div id="home" class="Home">
        <div class="text">
            <h1>MacBook รุ่นใหม่ล่าสุด พร้อมส่งทั่วไทย</h1>
            <p>เลือกMacBookที่ใช่ทั้ง Air และ Pro ครบทุกสเปครองรับทุกการใช้งาน</p>
            <button id="macbook">เลือกดู MacBook</button>
        </div>
    </div> 
</body>
</html>
